name: Build SpectrumApp iOS

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 120

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install system dependencies
      run: |
        brew install autoconf automake libtool pkg-config

    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip
        pip install cython kivy-ios

    - name: Build native dependencies
      run: |
        toolchain build python3 numpy kivy

    - name: Create iOS project
      run: |
        toolchain create SpectrumApp .

    - name: Copy assets
      run: |
        cp chart.png SpectrumApp-ios/

    - name: Upload project
      uses: actions/upload-artifact@v4
      with:
        name: SpectrumApp-iOS
        path: SpectrumApp-ios
